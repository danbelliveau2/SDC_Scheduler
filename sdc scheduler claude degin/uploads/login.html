<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SDC Scheduler</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sdc-dark);
      color: white;
      height: 100vh;
      margin: 0;
      overflow: auto;
    }
    .login-card {
      background: white;
      color: var(--text);
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      width: 360px;
      max-width: 90vw;
    }
    .login-logo {
      display: block;
      height: 48px;
      margin: 0 auto 24px;
    }
    .login-card h2 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 20px;
    }
    .login-field {
      margin-bottom: 16px;
    }
    .login-field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .login-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 14px;
    }
    .login-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .btn-login {
      width: 100%;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/img/sdc-logo-blue.svg" alt="SDC" class="login-logo" />
    <h2>SDC Project Scheduler</h2>
    <div id="error" class="login-error"></div>
    <form id="login-form">
      <div class="login-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username" />
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary btn-login">Login</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errDiv = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errDiv.style.display = 'none';

      const username = form.username.value;
      const password = form.password.value;

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await r.json();
        if (r.ok) {
          // Success: redirect to home
          window.location.href = '/';
        } else {
          errDiv.textContent = data.error || 'Login failed';
          errDiv.style.display = 'block';
        }
      } catch (err) {
        errDiv.textContent = 'Connection error';
        errDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
